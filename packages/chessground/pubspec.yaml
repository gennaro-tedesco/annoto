name: chessground
description: Chess board UI developed for lichess.org. It has no chess logic inside so it can be used for chess variants.
version: 9.0.0
repository: https://github.com/lichess-org/flutter-chessground
funding:
  - https://lichess.org/patron

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: ">=3.29.0"

dependencies:
  dartchess: ^0.12.0
  fast_immutable_collections: ^11.0.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  lint: ^2.6.1
  mocktail: ^1.0.4

flutter:
  assets:
    - assets/piece_sets/alpha/
    - assets/piece_sets/cburnett/
    - assets/piece_sets/merida/
    - assets/boards/
